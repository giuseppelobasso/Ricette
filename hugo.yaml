baseURL: "https://giuseppelobasso.github.io/Ricette/"
languageCode: "it"
title: "Le mie Ricette"
theme: "congo"
future: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  category: categories
  tag: tags

menu:
  main:
    - name: Archivio
      pageRef: archives
      weight: 10
    - name: Categorie
      url: /categories/
      weight: 30

params:
  colorScheme: fire
  defaultAppearance: light
  enableSearch: true

  homepage:
    layout: page
    showRecent: true
    recentLimit: 20
    cardView: true

  article:
    showDate: true
    showAuthor: false
    showReadingTime: false
    showTableOfContents: false
    showTaxonomies: true
    showWordCount: false

  list:
    showSummary: true
    cardView: true

  header:
    layout: basic

  footer:
    showCopyright: false
    showThemeAttribution: false
    showScrollToTop: true
